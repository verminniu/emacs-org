patch:
  # 默认为moqi
  grammar:
    language: zh-moqi
    non_collocation_penalty: -4
    collocation_max_length: 5
    collocation_min_length: 2
    collocation_penalty: -14
  translator/contextual_suggestions: true
  translator/max_homophones: 4
  translator/max_homographs: 2

  # 1. 把下划线加入字母表 (认为是单词的一部分)
  "speller/alphabet": "zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA_"

  # 1. 彻底清空识别器中的标点正则，防止它把 Shift+- 识别为特殊符号模式
  "recognizer/patterns/punct": ""

  # 2. 强行重置标点符号板，确保没有任何逻辑能把 _ 转换成其他字符
  "punctuator/half_shape/_": "_"
  "punctuator/full_shape/_": "_"

  # 薄荷拼音没有使用default.custom.yaml,配置放这里
  "key_binder/bindings/+":
    - { when: always, accept: Control+Shift+3, toggle: print } # 覆盖掉 切换全角/半角
    - { when: always, accept: Shift+space, toggle: print } # 覆盖掉 另一种切换全角/半角的方式
    - { when: has_menu, accept: comma, send: Page_Up }
    - { when: has_menu, accept: period, send: Page_Down }
    - { when: paging, accept: comma, send: Page_Up }
    - { when: paging, accept: period, send: Page_Down }
    # 覆盖掉default里面的翻页方便输入英文连字
    # 当有输入码（menu）时，按下减号，执行“提交原始字符”并输入减号
    - { when: has_menu, accept: minus, send_sequence: "{Return}-" }
    - { when: has_menu, accept: equal, send: equal }
  # 对 speller/algebra 进行追加
  "speller/algebra/+":
    - derive/v/u/ # u => ü
  # 设置拼音分词
  "speller/delimiter": " '"
