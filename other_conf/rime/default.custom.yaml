patch:
  # 指定服务默认用英文模式 - 需要放到 squirrel.custom.yaml 或者 weasel.custom.yaml 会生效
  #app_options:
  #  # VS Code
  #  com.microsoft.VSCode:
  #    ascii_mode: true
  #  # IntelliJ IDEA
  #  com.jetbrains.intellij.ce:
  #    ascii_mode: true
  #  # Emacsdddd
  #  org.gnu.Emacs:
  #    ascii_mode: true
  #  # Ghostty
  #  com.mitchellh.ghostty:
  #    ascii_mode: true
  #  com.raycast.macos:
  #    ascii_mode: true
  "key_binder/bindings":
    - { when: always, accept: Control+Shift+3, toggle: print } # 覆盖掉 切换全角/半角
    - { when: always, accept: Shift+space, toggle: print } # 覆盖掉 另一种切换全角/半角的方式
    - { when: has_menu, accept: comma, send: Page_Up }
    - { when: has_menu, accept: period, send: Page_Down }
    - { when: paging, accept: comma, send: Page_Up }
    - { when: paging, accept: period, send: Page_Down }
    # 覆盖掉default里面的翻页方便输入英文连字
    # 当有输入码（menu）时，按下减号，执行“提交原始字符”并输入减号
    - { when: has_menu, accept: minus, send_sequence: "{Return}-" } # 先上屏编码
    - { when: has_menu, accept: equal, send: equal }
